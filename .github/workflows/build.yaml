name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check --all
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  build:
    name: Build ${{ matrix.target }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: seednet-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: seednet-aarch64-linux
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: seednet-x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: seednet-aarch64-linux-musl
          - target: x86_64-apple-darwin
            os: macos-13
            name: seednet-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            name: seednet-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: seednet-x86_64-windows.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: seednet-aarch64-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: endsWith(matrix.target, '-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Configure aarch64-linux-gnu linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release -p seednet-cli --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/seednet"
          EXT="${{ matrix.target }}"
          if [[ "$EXT" == *"-windows-"* ]]; then
            BIN="${BIN}.exe"
          fi
          cp "$BIN" "${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          if-no-files-found: error
